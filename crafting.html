<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crafting Rechner - Holzi1567</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-overworld">

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Holzi1567</a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Start</a></li>
        <li><a href="server-status.html">Server</a></li>
        <li><a href="builds.html">Builds</a></li>
        <li><a href="achievements.html">Erfolge</a></li>
        <li><a href="pvp-tipps.html">PvP Tipps</a></li>
        <li><a href="crafting.html" class="active">Crafting</a></li>
        <li><a href="minigame.html">Minispiel</a></li>
        <li><a href="inventar.html">Inventar</a></li>
      </ul>
      <div class="nav-controls">
        <div class="theme-switcher">
          <button class="nav-control-btn" id="themeToggle" title="Theme wechseln">🌍</button>
          <div class="theme-dropdown" id="themeDropdown">
            <button class="theme-option" data-theme="overworld">🌍 Overworld</button>
            <button class="theme-option" data-theme="nether">🔥 Nether</button>
            <button class="theme-option" data-theme="end">🔮 End</button>
          </div>
        </div>
        <button class="nav-control-btn" id="soundToggle" title="Sound an/aus">🔇</button>
        <button class="nav-control-btn" id="dayNightIndicator" title="Tageszeit">☀️</button>
      </div>
    </div>
  </nav>

  <div class="stars-container" id="starsContainer"></div>
  <div class="particles-container" id="particlesContainer"></div>

  <div class="floating-block floating-block-1"></div>
  <div class="floating-block floating-block-2"></div>
  <div class="floating-block floating-block-3"></div>

  <div class="main-content">
    <h1 class="page-title fade-in">Crafting Rechner</h1>
    <p class="page-subtitle fade-in fade-in-delay-1">Klicke ein Item aus der Liste, dann klicke auf einen Slot im Grid!</p>

    <div class="crafting-container fade-in fade-in-delay-2">
      <div class="crafting-items-panel">
        <input type="text" class="crafting-search" id="craftingSearch" placeholder="Item suchen...">
        <div class="items-list" id="itemsList">
          <!-- Wird von JS gefuellt -->
        </div>
      </div>

      <div class="crafting-table">
        <h2 class="crafting-table-title">Werkbank</h2>
        <div class="crafting-area">
          <div class="crafting-grid" id="craftingGrid">
            <div class="grid-slot" data-slot="0"></div>
            <div class="grid-slot" data-slot="1"></div>
            <div class="grid-slot" data-slot="2"></div>
            <div class="grid-slot" data-slot="3"></div>
            <div class="grid-slot" data-slot="4"></div>
            <div class="grid-slot" data-slot="5"></div>
            <div class="grid-slot" data-slot="6"></div>
            <div class="grid-slot" data-slot="7"></div>
            <div class="grid-slot" data-slot="8"></div>
          </div>
          <div class="crafting-arrow">➡️</div>
          <div>
            <div class="result-slot" id="resultSlot"></div>
            <div class="result-info" id="resultInfo"></div>
          </div>
        </div>
        <button class="mc-btn mc-btn-danger" id="clearGrid" style="margin-top:16px;">Rezept loeschen</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Gemacht mit ❤️ und ⛏️ von Holzi1567 | 2026</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/crafting.js"></script>
</body>
</html>
